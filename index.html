<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Qué Onda Cancún</title>
    <meta
      name="description"
      content="Qué Onda Cancún: noticias, aperturas, eventos, turismo, promos, oportunidades, política, chismes y alertas de Cancún."
    >
    <link rel="canonical" href="https://queondacancun.com/">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell" aria-label="Qué Onda Cancún">
      <section class="intro">
        <h1>Qué Onda Cancún</h1>
        <p class="tagline">Todo lo que necesitas saber de Cancún en tres minutos</p>
        <p class="categories" aria-label="Categorías">
          <span>Noticias</span>
          <span>Aperturas</span>
          <span>Eventos</span>
          <span>Turismo</span>
          <span>Promos</span>
          <span>Oportunidades</span>
          <span>Política</span>
          <span>Chismes</span>
          <span>Alertas</span>
        </p>
        <div class="subscribe" aria-label="Suscripción por email o WhatsApp">
          <div class="channel-toggle" aria-label="Elige cómo recibirlo">
            <button type="button" class="channel active">Email</button>
            <button type="button" class="channel">WhatsApp</button>
          </div>
          <label class="signup-field">
            <span>Elige uno</span>
            <input type="email" name="email" placeholder="tu@email.com" autocomplete="email">
          </label>
          <button type="button">Suscribirme</button>
        </div>
      </section>
    </main>
    <script>
      const channels = document.querySelectorAll(".channel");
      const signupInput = document.querySelector(".signup-field input");

      channels.forEach((channel) => {
        channel.addEventListener("click", () => {
          channels.forEach((item) => item.classList.remove("active"));
          channel.classList.add("active");

          const isWhatsApp = channel.textContent.trim() === "WhatsApp";
          signupInput.type = isWhatsApp ? "tel" : "email";
          signupInput.name = isWhatsApp ? "whatsapp" : "email";
          signupInput.placeholder = isWhatsApp ? "+52 998 000 0000" : "tu@email.com";
          signupInput.autocomplete = isWhatsApp ? "tel" : "email";
        });
      });
    </script>
  </body>
</html>
