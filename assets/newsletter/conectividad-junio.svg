<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Conectividad aérea de Cancún</title>
  <desc id="desc">Tablero visual con cambios de rutas aéreas relevantes para Cancún.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#063735"/>
      <stop offset="1" stop-color="#082320"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6fffb" stop-opacity=".34"/>
      <stop offset=".48" stop-color="#57d5ce" stop-opacity=".16"/>
