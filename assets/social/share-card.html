<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1200, initial-scale=1">
    <title>Qué Onda Cancún Share Card</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1200px;
        height: 630px;
        margin: 0;
        overflow: hidden;
        background: #071114;
        font-family: Avenir, "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        color: #f7fbfb;
        background:
          radial-gradient(circle at 82% 8%, rgba(0, 176, 198, 0.36), transparent 34%),
          radial-gradient(circle at 10% 88%, rgba(251, 181, 3, 0.22), transparent 32%),
          radial-gradient(circle at 88% 92%, rgba(69, 169, 58, 0.18), transparent 30%),
          linear-gradient(135deg, #071114 0%, #0d181b 52%, #162125 100%);
      }

      .grain {
        position: absolute;
        inset: 0;
        opacity: 0.11;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: radial-gradient(circle at center, black, transparent 76%);
      }

      .card {
        position: relative;
        width: 1044px;
        height: 410px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.23);
        border-radius: 46px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.045)),
          rgba(7, 17, 20, 0.48);
        box-shadow:
          0 34px 100px rgba(0, 0, 0, 0.46),
          inset 0 1px 0 rgba(255, 255, 255, 0.24);
        backdrop-filter: blur(22px);
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 22px 26px auto;
        height: 78px;
        border-radius: 32px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.14), transparent);
        pointer-events: none;
      }

      .content {
        position: relative;
        display: grid;
        justify-items: center;
        gap: 36px;
        transform: translateY(2px);
      }

      .logo {
        width: 858px;
        height: auto;
        display: block;
        filter: drop-shadow(0 22px 32px rgba(0, 0, 0, 0.30));
      }

      .subtitle {
        margin: 0;
        font-size: 36px;
        line-height: 1.08;
        font-weight: 700;
        letter-spacing: 0;
        color: rgba(247, 251, 251, 0.96);
        text-shadow: 0 3px 20px rgba(0, 0, 0, 0.45);
      }
    </style>
  </head>
  <body>
    <div class="grain"></div>
    <section class="card" aria-label="Qué Onda Cancún">
      <div class="content">
        <img class="logo" src="./que-onda-logo-trimmed.png" alt="Qué Onda Cancún">
        <p class="subtitle">Todo lo que necesitas saber de Cancún en cinco minutos</p>
      </div>
    </section>
  </body>
</html>
