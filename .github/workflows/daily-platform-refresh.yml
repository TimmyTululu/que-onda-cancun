name: Daily Platform Refresh

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-platform-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      TZ: America/Cancun
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies when present
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found; skipping dependency install."
          fi

      - name: Refresh platform data
        run: node scripts/refresh-platform-data.mjs

      - name: Generate platform snapshots
        run: node scripts/generate-platform-snapshots.mjs

      - name: Validate platform
        run: |
          node --check app.js
          node --check scripts/generate-platform-snapshots.mjs
          node scripts/check-platform.mjs
          node scripts/check-newsletter.mjs

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- data/platform.json data/platform-candidates.json data/platform-refresh-report.json index.html esta-semana/index.html eventos/index.html promos/index.html party/index.html; then
            echo "No platform data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/platform.json data/platform-candidates.json data/platform-refresh-report.json index.html esta-semana/index.html eventos/index.html promos/index.html party/index.html
          git commit -m "chore: refresh daily platform data"
          git push
